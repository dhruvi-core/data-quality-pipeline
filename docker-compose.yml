services:

  spark-master:
    build: .
    container_name: spark-master

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master

    ports:
      - "8080:8080"
      - "7077:7077"

    volumes:
      - ./spark_jobs:/opt/spark/jobs
      - ./data:/opt/spark/data

    networks:
      - trading-network

  spark-worker:
    build: .
    container_name: spark-worker

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077

    depends_on:
      - spark-master

    volumes:
      - ./spark_jobs:/opt/spark/jobs
      - ./data:/opt/spark/data

    networks:
      - trading-network

  mongodb:
    image: mongo:7
    container_name: trading-mongodb

    command: ["mongod","--bind_ip_all"]

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

    networks:
      - trading-network

  postgres:
    image: postgres:16
    container_name: airflow-postgres

    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

    ports:
      - "5432:5432"

    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

    networks:
      - trading-network

  airflow-webserver:
    image: apache/airflow:2.10.0
    container_name: airflow-webserver

    depends_on:
      - postgres

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"

    ports:
      - "8081:8080"

    volumes:
      - ./dags:/opt/airflow/dags
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./data:/opt/airflow/data
      - /var/run/docker.sock:/var/run/docker.sock

    command: webserver

    networks:
      - trading-network

  airflow-scheduler:
    image: apache/airflow:2.10.0
    container_name: airflow-scheduler

    depends_on:
      - postgres

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"

    volumes:
      - ./dags:/opt/airflow/dags
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./data:/opt/airflow/data
      - /var/run/docker.sock:/var/run/docker.sock

    command: scheduler

    networks:
      - trading-network

networks:
  trading-network:

volumes:
  mongo-data:
  postgres-db-volume: