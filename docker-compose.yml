services:

  # ==========================================
  # Spark Master
  # ==========================================
  spark-master:
    build: .
    container_name: spark-master

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master

    ports:
      - "8080:8080"
      - "7077:7077"

    volumes:
      - ./spark_jobs:/opt/spark/jobs
      - ./data:/opt/spark/data

    networks:
      - trading-network


  # ==========================================
  # Spark Worker
  # ==========================================
  spark-worker:
    build: .
    container_name: spark-worker

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077

    depends_on:
      - spark-master

    volumes:
      - ./spark_jobs:/opt/spark/jobs
      - ./data:/opt/spark/data

    networks:
      - trading-network


  # ==========================================
  # MongoDB
  # Stores Good and Bad Records
  # ==========================================
  mongodb:
    image: mongo:7
    container_name: trading-mongodb

    command:
      - "mongod"
      - "--bind_ip_all"

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

    networks:
      - trading-network


  # ==========================================
  # Airflow PostgreSQL
  # Stores Airflow Metadata
  # ==========================================
  postgres:
    image: postgres:16
    container_name: airflow-postgres

    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

    ports:
      - "5432:5432"

    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

    networks:
      - trading-network


  # ==========================================
  # Airflow Webserver
  # ==========================================
  airflow-webserver:
    build:
      context: .
      dockerfile: airflow.Dockerfile

    container_name: airflow-webserver

    depends_on:
      - postgres

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

      AIRFLOW__CORE__LOAD_EXAMPLES: "False"

      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth

      AIRFLOW__WEBSERVER__SECRET_KEY: "data-quality-pipeline-secret-key-2026"

    ports:
      - "8081:8080"

    volumes:
      - ./dags:/opt/airflow/dags
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./data:/opt/airflow/data
      - /var/run/docker.sock:/var/run/docker.sock

    command: webserver

    networks:
      - trading-network


  # ==========================================
  # Airflow Scheduler
  # ==========================================
  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow.Dockerfile

    container_name: airflow-scheduler

    depends_on:
      - postgres

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

      AIRFLOW__CORE__LOAD_EXAMPLES: "False"

      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth

      AIRFLOW__WEBSERVER__SECRET_KEY: "data-quality-pipeline-secret-key-2026"

    volumes:
      - ./dags:/opt/airflow/dags
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./data:/opt/airflow/data
      - /var/run/docker.sock:/var/run/docker.sock

    command: scheduler

    networks:
      - trading-network


  # ==========================================
  # Rules PostgreSQL
  # Stores User Validation Rules
  # ==========================================
  rules-postgres:
    image: postgres:16
    container_name: rules-postgres

    environment:
      POSTGRES_USER: rules_user
      POSTGRES_PASSWORD: rules_password
      POSTGRES_DB: rules_db

    ports:
      - "5433:5432"

    volumes:
      - rules-postgres-data:/var/lib/postgresql/data

    networks:
      - trading-network


  # ==========================================
  # FastAPI Backend
  # ==========================================
  backend:
    build:
      context: ./backend

    container_name: data-quality-backend

    depends_on:
      - rules-postgres
      - mongodb

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    networks:
      - trading-network


# ==========================================
# Docker Network
# ==========================================
networks:

  trading-network:
    driver: bridge


# ==========================================
# Persistent Volumes
# ==========================================
volumes:

  mongo-data:

  postgres-db-volume:

  rules-postgres-data: